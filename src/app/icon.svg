<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="8" fill="#0B0F19"/>

  <circle cx="16" cy="16" r="14" fill="url(#glow)">
    <animate attributeName="r" values="12;14;12" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="16" cy="16" r="9" fill="#8B5CF6" fill-opacity="0.18" filter="url(#blur)">
    <animate attributeName="r" values="8;10;8" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="16" cy="16" r="6" stroke="url(#core)" stroke-width="1.5" fill="none" opacity="0.9">
    <animate attributeName="r" values="5.5;6.5;5.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <path d="M16 10v12M10 16h12" stroke="url(#core)" stroke-width="1.8" stroke-linecap="round"/>

  <circle cx="16" cy="16" r="1.8" fill="#A855F7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
